- name: Check if Kubernetes is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kube_admin_conf
  become: true

- name: Initialize Kubernetes cluster
  ansible.builtin.command:
    cmd: kubeadm init --pod-network-cidr=10.244.0.0/16 --apiserver-advertise-address={{ ansible_host }}
  when: not kube_admin_conf.stat.exists
  become: true

- name: Ensure .kube directory exists
  ansible.builtin.file:
    path: /home/bigboss/.kube
    state: directory
    mode: '0755'
    owner: bigboss
    group: bigboss
  become: true

- name: Copy admin.conf to user's kube config
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/bigboss/.kube/config
    remote_src: true
    owner: bigboss
    group: bigboss
    mode: '0600'
  become: true

- name: Allow scheduling on control-plane nodes
  ansible.builtin.command:
    cmd: kubectl taint nodes --all {{ item }}- --kubeconfig=/etc/kubernetes/admin.conf
  loop:
    - node-role.kubernetes.io/control-plane
    - node-role.kubernetes.io/master
  register: taint_output
  failed_when: false
  changed_when: "'untainted' in taint_output.stdout"
  become: true

- name: Install Flannel CNI
  ansible.builtin.command:
    cmd: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml --kubeconfig=/etc/kubernetes/admin.conf
  register: flannel_output
  changed_when: "'created' in flannel_output.stdout or 'configured' in flannel_output.stdout"
  become: true
